name: Update AWS RSS Feeds

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3am UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI
  
  permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch services.json and generate feed files
        run: |
          python3 - <<'EOF'
          import json, urllib.request

          url = "https://servicedata-us-west-2-prod.s3.amazonaws.com/services.json"
          rss_base = "https://status.aws.amazon.com/rss/"

          print(f"Fetching {url} ...")
          with urllib.request.urlopen(url, timeout=20) as r:
              services = json.loads(r.read())

          print(f"Got {len(services)} service entries.")

          # Flat list
          urls = sorted(set(f"{rss_base}{s['service']}.rss" for s in services))
          with open("aws_rss_feeds.txt", "w") as f:
              f.write("\n".join(urls) + "\n")
          print(f"Written aws_rss_feeds.txt ({len(urls)} feeds)")

          # Structured JSON: service_name -> region_name -> url
          structured = {}
          for s in services:
              name   = s.get("service_name") or "Unknown"
              region = s.get("region_name")  or "global"
              url    = f"{rss_base}{s['service']}.rss"
              structured.setdefault(name, {})[region] = url

          sorted_out = {k: dict(sorted(v.items())) for k, v in sorted(structured.items())}
          with open("aws_rss_feeds.json", "w") as f:
              json.dump(sorted_out, f, indent=2)
              f.write("\n")
          print(f"Written aws_rss_feeds.json ({len(sorted_out)} services)")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aws_rss_feeds.txt aws_rss_feeds.json
          if git diff --staged --quiet; then
            echo "No changes - feed list is up to date."
          else
            COUNT=$(wc -l < aws_rss_feeds.txt | tr -d ' ')
            git commit -m "chore: update AWS RSS feeds (${COUNT} feeds) [skip ci]"
            git push
            echo "Changes committed and pushed."
          fi
