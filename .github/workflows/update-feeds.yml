name: Update AWS RSS Feeds

on:
  schedule:
    - cron: '33 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fetch services.json and generate feed files
        run: |
          python3 - <<'EOF'
          import json, re, urllib.request, datetime, os

          url = "https://servicedata-us-west-2-prod.s3.amazonaws.com/services.json"
          rss_base = "https://status.aws.amazon.com/rss/"

          print(f"Fetching {url} ...")
          with urllib.request.urlopen(url, timeout=20) as r:
              services = json.loads(r.read())

          # Build structured data
          structured = {}
          for s in services:
              name   = s.get("service_name") or "Unknown"
              region = s.get("region_name")  or "global"
              u      = f"{rss_base}{s['service']}.rss"
              structured.setdefault(name, {})[region] = u

          sorted_out = {k: dict(sorted(v.items())) for k, v in sorted(structured.items())}

          # Load previous version for diffing
          prev = {}
          if os.path.exists("aws_rss_feeds.json"):
              with open("aws_rss_feeds.json") as f:
                  prev = json.load(f)

          # Detect changes
          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d")
          changes = []

          for svc, regs in sorted_out.items():
              if svc not in prev:
                  changes.append(f"- Added service **{svc}** ({', '.join(sorted(regs.keys()))})")
              else:
                  for reg in regs:
                      if reg not in prev[svc]:
                          changes.append(f"- Added **{svc}** in {reg}")

          for svc, regs in prev.items():
              if svc not in sorted_out:
                  changes.append(f"- Removed service **{svc}**")
              else:
                  for reg in regs:
                      if reg not in sorted_out[svc]:
                          changes.append(f"- Removed **{svc}** from {reg}")

          # Write changes to file for next step
          with open("changes.txt", "w") as f:
              f.write("\n".join(changes))

          # Write flat list
          urls = sorted(set(f"{rss_base}{s['service']}.rss" for s in services))
          with open("aws_rss_feeds.txt", "w") as f:
              f.write("\n".join(urls) + "\n")

          # Write JSON
          with open("aws_rss_feeds.json", "w") as f:
              json.dump(sorted_out, f, indent=2)
              f.write("\n")

          # Update CHANGELOG
          if changes:
              changelog_entry = f"## {updated}\n\n" + "\n".join(changes) + "\n"
              existing = ""
              if os.path.exists("CHANGELOG.md"):
                  with open("CHANGELOG.md") as f:
                      existing = f.read()
              with open("CHANGELOG.md", "w") as f:
                  f.write("# Changelog\n\n")
                  f.write(changelog_entry + "\n")
                  if existing:
                      f.write(existing.replace("# Changelog\n\n", ""))

          # Get last 5 changes from CHANGELOG for README
          recent_changes = []
          if os.path.exists("CHANGELOG.md"):
              with open("CHANGELOG.md") as f:
                  content = f.read()
              raw_entries = content.replace("# Changelog\n\n", "").split("\n## ")
              raw_entries = [e.strip() for e in raw_entries if e.strip()]
              for entry in raw_entries[:5]:
                  if not entry.startswith("## "):
                      entry = "## " + entry
                  recent_changes.append(entry)

          # Region counts and IDs
          region_counts = {}
          region_ids = {}
          for svc, regs in sorted_out.items():
              for reg, u in regs.items():
                  region_counts[reg] = region_counts.get(reg, 0) + 1
                  if reg not in region_ids:
                      slug = u.split('/rss/')[-1].replace('.rss','')
                      m = re.search(r'-(us|eu|ap|sa|ca|me|af|il|mx|cn|us-gov|us-iso)(-.+)$', slug)
                      region_ids[reg] = m.group(0).lstrip('-') if m else 'global'

          total_feeds = sum(len(regs) for regs in sorted_out.values())
          feed_count = f"{total_feeds:,}"
          svc_count  = f"{len(sorted_out):,}"
          reg_count  = f"{len(region_counts):,}"

          lines = []
          lines.append("# AWS Status RSS Feeds")
          lines.append("")
          lines.append("Auto-updated list of every AWS Service Health Dashboard RSS feed URL, refreshed daily via GitHub Actions.")
          lines.append("")
          lines.append(f"Currently tracking **{feed_count} feeds** across **{svc_count} services** and **{reg_count} regions**.")
          lines.append("")
          lines.append(f"_Last checked: {updated} UTC_")
          lines.append("")
          if recent_changes:
              lines.append("## Recent changes by AWS")
              lines.append("")
              for entry in recent_changes:
                  lines.append(entry)
                  lines.append("")
              lines.append("_Full history in [CHANGELOG.md](CHANGELOG.md)_")
              lines.append("")
          lines.append("## Files")
          lines.append("")
          lines.append("- `aws_rss_feeds.txt` - flat list, one URL per line")
          lines.append("- `aws_rss_feeds.json` - grouped by service name and region")
          lines.append("- `CHANGELOG.md` - history of AWS service and region additions/removals")
          lines.append("")
          lines.append(f"## Regions ({reg_count})")
          lines.append("")
          lines.append("| Region ID | Location | Services |")
          lines.append("|-----------|----------|----------|")
          for reg in sorted(region_counts.keys(), key=lambda x: region_ids.get(x, x)):
              lines.append(f"| {region_ids.get(reg, '')} | {reg} | {region_counts[reg]:,} |")
          lines.append("")
          lines.append(f"## Services ({svc_count})")
          lines.append("")
          lines.append("| Service | Region Count |")
          lines.append("|---------|-------------|")
          for svc in sorted(sorted_out.keys()):
              lines.append(f"| {svc} | {len(sorted_out[svc]):,} |")
          lines.append("")
          lines.append("## Source")
          lines.append("")
          lines.append("Feed URLs are derived from the `services.json` endpoint that powers the official [AWS Health Dashboard](https://health.aws.amazon.com/health/status).")
          lines.append("")
          lines.append("## License")
          lines.append("")
          lines.append("This project is released under the MIT License.")
          lines.append("")

          with open("README.md", "w") as f:
              f.write("\n".join(lines))

          print(f"Done: {feed_count} feeds, {svc_count} services, {reg_count} regions")
          if changes:
              print(f"Changes detected: {len(changes)}")
              for c in changes:
                  print(f"  {c}")
          else:
              print("No changes detected.")
          EOF

      - name: Open issue if AWS made changes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGES=$(cat changes.txt)
          if [ -n "$CHANGES" ]; then
            DATE=$(date -u +%Y-%m-%d)
            gh issue create \
              --title "AWS service changes detected: $DATE" \
              --body "The following changes were detected in the AWS Service Health Dashboard feeds:

          $CHANGES

          See [CHANGELOG.md](../blob/main/CHANGELOG.md) for full history." \
              --label "aws-change"
          fi

      - name: Commit and push if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aws_rss_feeds.txt aws_rss_feeds.json README.md
          [ -f CHANGELOG.md ] && git add CHANGELOG.md || true
          if git diff --staged --quiet; then
            echo "No changes - feed list is up to date."
          else
            COUNT=$(wc -l < aws_rss_feeds.txt | tr -d ' ')
            git commit -m "chore: update AWS RSS feeds (${COUNT} feeds) [skip ci]"
            git push --force https://x-access-token:${GH_PAT}@github.com/lugnut29/aws-status-rss-feeds.git HEAD:main
            echo "Changes committed and pushed."
          fi
