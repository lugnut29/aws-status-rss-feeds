name: Update AWS RSS Feeds

on:
  schedule:
    - cron: '33 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch services.json and generate feed files
        run: |
          python3 - <<'EOF'
          import json, urllib.request, datetime

          url = "https://servicedata-us-west-2-prod.s3.amazonaws.com/services.json"
          rss_base = "https://status.aws.amazon.com/rss/"

          print(f"Fetching {url} ...")
          with urllib.request.urlopen(url, timeout=20) as r:
              services = json.loads(r.read())

          urls = sorted(set(f"{rss_base}{s['service']}.rss" for s in services))
          with open("aws_rss_feeds.txt", "w") as f:
              f.write("\n".join(urls) + "\n")

          structured = {}
          for s in services:
              name   = s.get("service_name") or "Unknown"
              region = s.get("region_name")  or "global"
              url    = f"{rss_base}{s['service']}.rss"
              structured.setdefault(name, {})[region] = url

          sorted_out = {k: dict(sorted(v.items())) for k, v in sorted(structured.items())}
          with open("aws_rss_feeds.json", "w") as f:
              json.dump(sorted_out, f, indent=2)
              f.write("\n")

          updated = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          readme = (
              "# AWS Status RSS Feeds\n\n"
              "Auto-updated list of every AWS Service Health Dashboard RSS feed URL, refreshed daily via GitHub Actions.\n\n"
              f"Currently tracking **{len(urls)} feeds** across **{len(sorted_out)} services**.\n\n"
              "## Files\n\n"
              "- `aws_rss_feeds.txt` - flat list, one URL per line\n"
              "- `aws_rss_feeds.json` - grouped by service name and region\n\n"
              "## Source\n\n"
              "Feed URLs are derived from the `services.json` endpoint that powers the official [AWS Health Dashboard](https://health.aws.amazon.com/health/status).\n\n"
              f"_Last updated: {updated} UTC_\n\n"
              "## License\n\n"
              "This project is released under the MIT License.\n"
          )
          with open("README.md", "w") as f:
              f.write(readme)

          print(f"Done: {len(urls)} feeds, {len(sorted_out)} services")
          EOF

      - name: Commit and push if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aws_rss_feeds.txt aws_rss_feeds.json README.md
          if git diff --staged --quiet; then
            echo "No changes - feed list is up to date."
          else
            COUNT=$(wc -l < aws_rss_feeds.txt | tr -d ' ')
            git commit -m "chore: update AWS RSS feeds (${COUNT} feeds) [skip ci]"
            git push --force https://x-access-token:${GH_PAT}@github.com/lugnut29/aws-status-rss-feeds.git HEAD:main
            echo "Changes committed and pushed."
          fi
