name: Update AWS RSS Feeds

on:
  schedule:
    - cron: '33 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fetch services.json and generate feed files
        run: |
          python3 - <<'EOF'
          import json, re, urllib.request, datetime

          url = "https://servicedata-us-west-2-prod.s3.amazonaws.com/services.json"
          rss_base = "https://status.aws.amazon.com/rss/"

          print(f"Fetching {url} ...")
          with urllib.request.urlopen(url, timeout=20) as r:
              services = json.loads(r.read())

          urls = sorted(set(f"{rss_base}{s['service']}.rss" for s in services))
          with open("aws_rss_feeds.txt", "w") as f:
              f.write("\n".join(urls) + "\n")

          structured = {}
          for s in services:
              name   = s.get("service_name") or "Unknown"
              region = s.get("region_name")  or "global"
              u      = f"{rss_base}{s['service']}.rss"
              structured.setdefault(name, {})[region] = u

          sorted_out = {k: dict(sorted(v.items())) for k, v in sorted(structured.items())}
          with open("aws_rss_feeds.json", "w") as f:
              json.dump(sorted_out, f, indent=2)
              f.write("\n")

          region_counts = {}
          region_ids = {}
          for svc, regs in sorted_out.items():
              for reg, u in regs.items():
                  region_counts[reg] = region_counts.get(reg, 0) + 1
                  if reg not in region_ids:
                      slug = u.split('/rss/')[-1].replace('.rss','')
                      m = re.search(r'-(us|eu|ap|sa|ca|me|af|il|mx|cn|us-gov|us-iso)(-.+)$', slug)
                      region_ids[reg] = m.group(0).lstrip('-') if m else 'global'

          total_feeds = sum(len(regs) for regs in sorted_out.values())
          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d")
          feed_count = f"{total_feeds:,}"
          svc_count = f"{len(sorted_out):,}"
          reg_count = f"{len(region_counts):,}"

          lines = []
          lines.append("# AWS Status RSS Feeds")
          lines.append("")
          lines.append("Auto-updated list of every AWS Service Health Dashboard RSS feed URL, refreshed daily via GitHub Actions.")
          lines.append("")
          lines.append(f"Currently tracking **{feed_count} feeds** across **{svc_count} services** and **{reg_count} regions**.")
          lines.append("")
          lines.append(f"_Last updated: {updated} UTC_")
          lines.append("")
          lines.append("## Files")
          lines.append("")
          lines.append("- `aws_rss_feeds.txt` - flat list, one URL per line")
          lines.append("- `aws_rss_feeds.json` - grouped by service name and region")
          lines.append("")
          lines.append(f"## Regions ({reg_count})")
          lines.append("")
          lines.append("| Region ID | Location | Services |")
          lines.append("|-----------|----------|----------|")
          for reg in sorted(region_counts.keys(), key=lambda x: region_ids.get(x, x)):
              lines.append(f"| {region_ids.get(reg, '')} | {reg} | {region_counts[reg]:,} |")
          lines.append("")
          lines.append(f"## Services ({svc_count})")
          lines.append("")
          lines.append("| Service | Region Count |")
          lines.append("|---------|-------------|")
          for svc in sorted(sorted_out.keys()):
              lines.append(f"| {svc} | {len(sorted_out[svc]):,} |")
          lines.append("")
          lines.append("## Source")
          lines.append("")
          lines.append("Feed URLs are derived from the `services.json` endpoint that powers the official [AWS Health Dashboard](https://health.aws.amazon.com/health/status).")
          lines.append("")
          lines.append("## License")
          lines.append("")
          lines.append("This project is released under the MIT License.")
          lines.append("")

          with open("README.md", "w") as f:
              f.write("\n".join(lines))

          print(f"Done: {feed_count} feeds, {svc_count} services, {reg_count} regions")
          EOF

      - name: Commit and push if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aws_rss_feeds.txt aws_rss_feeds.json README.md
          if git diff --staged --quiet; then
            echo "No changes - feed list is up to date."
          else
            COUNT=$(wc -l < aws_rss_feeds.txt | tr -d ' ')
            git commit -m "chore: update AWS RSS feeds (${COUNT} feeds) [skip ci]"
            git push --force https://x-access-token:${GH_PAT}@github.com/lugnut29/aws-status-rss-feeds.git HEAD:main
            echo "Changes committed and pushed."
          fi
